<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>บัญชีรายรับ-รายจ่าย</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>body{margin:0;font-family:Tahoma,sans-serif;background:#eef3f5;color:#233;font-size:18px}.hide{display:none!important}.login{min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#55d0b8,#ffaaa0)}.card{background:#fff;border:3px solid #222;border-radius:16px;padding:22px;width:min(380px,92vw);box-shadow:0 16px 45px #0005}.row{display:grid;gap:5px;margin:10px 0}input,select,button{font:inherit;padding:8px;border-radius:8px;border:1px solid #aaa}.app{padding:8px}.top{display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:#fff;border:2px solid #222;border-radius:10px;padding:8px;position:sticky;top:0;z-index:2}.top h1{margin:0 12px 0 0}.btn{font-weight:700;cursor:pointer;background:#fff}.incomeBtn{background:#dff8f3}.expenseBtn{background:#ffe4e0}.warn{background:#fff6d7}.info{background:#e8f1ff}.danger{background:#ffe4e4;color:#a00}.months{display:flex;gap:6px;overflow:auto;padding:8px;background:#faffff;border:2px solid #222;border-top:0}.month{min-width:56px}.month.active{background:#4ecbb2;color:#fff}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.sec{background:#fff;border:2px solid #222}.title{text-align:center;font-size:28px;font-weight:800;padding:8px}.income .title{background:#55d0b8}.expense .title{background:#ffaaa0}.content{display:grid;grid-template-columns:380px 1fr 1fr;gap:8px;padding:8px}.box{overflow:auto}.cards{display:grid;grid-template-columns:repeat(2,minmax(130px,1fr));gap:8px}.kpi{text-align:center;background:#f7ffff;border:1px solid #cbd;padding:8px;border-radius:10px}.expense .kpi{background:#fff4f2}.icon{font-size:34px}.amt{font-weight:800;font-size:20px}table{border-collapse:collapse;width:100%;min-width:520px}th,td{border:1px solid #ddd;padding:6px}th{background:#d8f5ee}td:nth-child(2),th:nth-child(2){text-align:right}.group{background:#fff1da;font-weight:800}.tag{font-size:13px;border-radius:999px;padding:2px 8px}.Pending{background:#fff2ce;color:#9b6200}.Completed{background:#dff8e9;color:#14733a}.pill{text-align:center;border:1px solid #ccd;border-radius:999px;padding:5px;margin-top:5px;font-weight:800}canvas{height:280px!important;width:100%!important}dialog{border:0;border-radius:14px;box-shadow:0 18px 55px #0006;width:min(520px,94vw)}.modalHead{background:#222;color:#fff;font-weight:800;font-size:24px;padding:10px}.modalBody{display:grid;gap:10px;padding:12px}.formrow{display:grid;grid-template-columns:140px 1fr;gap:8px;align-items:center}.sync{font-size:14px;color:#456}@media(max-width:1000px){.grid{grid-template-columns:1fr}.content{grid-template-columns:1fr}.cards{grid-template-columns:1fr}canvas{height:260px!important}.formrow{grid-template-columns:1fr}}</style></head><body><section id="loginPage" class="login"><form class="card" onsubmit="login(event)"><h1>เข้าสู่ระบบ</h1><div class="row"><label>User</label><input id="loginUser" required value=""></div><div class="row"><label>Password</label><input id="loginPass" type="password" required></div><button style="width:100%;background:#222;color:#fff">Login</button><div id="loginError" style="color:#b00020;font-weight:800;text-align:center;min-height:24px"></div></form></section><main id="app" class="app hide"><div class="top"><h1>บัญชีรายรับ-รายจ่าย</h1><label>ปี <select id="yearSelect" onchange="selectYear(this.value)"><option>2026</option><option>2027</option><option>2028</option><option>2029</option></select></label><button class="btn incomeBtn" onclick="openModal('income')">+ รายรับ</button><button class="btn expenseBtn" onclick="openModal('expense')">+ รายจ่าย</button><button class="btn info" onclick="pullPrev()">ดึงเดือนก่อนหน้า</button><button class="btn warn" onclick="exportImage()">Export รูปภาพ</button><button class="btn" onclick="loadDB()">โหลดข้อมูลล่าสุด</button><span class="sync" id="syncStatus">ฐานข้อมูล: -</span><button class="btn" onclick="logout()">Logout</button></div><div id="monthPanel" class="months"></div><div class="grid"><section class="sec income"><div class="title">รายรับ</div><div class="content"><div class="box"><table id="incomeTable"></table></div><div class="box cards" id="incomeCards"></div><div class="box"><canvas id="incomePie"></canvas><div class="pill" id="incomeTotal"></div></div></div></section><section class="sec expense"><div class="title">รายจ่าย</div><div class="content"><div class="box"><table id="expenseTable"></table></div><div class="box cards" id="expenseCards"></div><div class="box"><canvas id="expensePie"></canvas><div class="pill" id="expenseTotal"></div><canvas id="expensePie2"></canvas><div class="pill" id="expenseTotal2"></div></div></div></section></div></main><dialog id="modal"><form method="dialog" onsubmit="saveItem(event)"><div class="modalHead" id="modalTitle"></div><div class="modalBody"><input type="hidden" id="editId"><input type="hidden" id="editType"><div class="formrow"><label>ประเภท</label><select id="itemType" onchange="toggleExpenseRows()"><option value="income">รายรับ</option><option value="expense">รายจ่าย</option></select></div><div class="formrow" id="groupRow"><label>กลุ่มรายจ่าย</label><select id="itemGroup"></select></div><div class="formrow" id="statusRow"><label>Status</label><label><input id="itemCompleted" type="checkbox"> Completed (ไม่ติ๊ก = Pending)</label></div><div class="formrow"><label>ชื่อรายการ</label><input id="itemName" required></div><div class="formrow"><label>จำนวนเงิน</label><input id="itemAmount" type="number" min="0" required></div><div class="formrow"><label>ไอคอน</label><input id="itemIcon"></div></div><div style="text-align:right;padding:10px;border-top:1px solid #eee"><button type="button" onclick="modal.close()">ยกเลิก</button><button style="background:#222;color:#fff">บันทึก</button></div></form></dialog><script>const AUTH_USER='admin',AUTH_PASS='siriphan';const years=['2026','2027','2028','2029'],months=['All','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],monthOnly=months.slice(1);const groups=['Essential Expenses','Financial Expenses','Self-Development','Personal Expenses','Health','Family','Variable / Emergency','Savings & Investment','Other'];const th={'Essential Expenses':'ค่าใช้จ่ายจำเป็น','Financial Expenses':'ภาระทางการเงิน','Self-Development':'พัฒนาตนเอง','Personal Expenses':'ค่าใช้จ่ายส่วนตัว','Health':'สุขภาพ','Family':'ครอบครัว','Variable / Emergency':'ผันแปร/ฉุกเฉิน','Savings & Investment':'ออมและลงทุน','Other':'อื่น ๆ'};const def={income:[['Salary','💰',614400],['Freelance','👨‍💻',635552],['Interest','📈',46041],['Bonus','💵',92260]],expense:[['Rent','🏠',348000,'Essential Expenses','Pending'],['Shopping','🛒',243722,'Personal Expenses','Pending'],['Transport','🚗',105643,'Essential Expenses','Pending'],['ค่าไฟ','🧾',2500,'Essential Expenses','Completed']]};let selectedYear,selectedMonth,data,monthly,charts={};function login(e){e.preventDefault();if(loginUser.value===AUTH_USER&&loginPass.value===AUTH_PASS){sessionStorage.setItem('ok','1');loginPage.classList.add('hide');app.classList.remove('hide');boot()}else loginError.textContent='User หรือ Password ไม่ถูกต้อง'}function logout(){sessionStorage.removeItem('ok');location.reload()}window.onload=()=>{if(sessionStorage.getItem('ok')){loginPage.classList.add('hide');app.classList.remove('hide');boot()}};function setCurrentMonth(){let d=new Date();selectedYear=String(d.getFullYear());if(!years.includes(selectedYear))selectedYear='2026';selectedMonth=monthOnly[d.getMonth()]}function norm(s){s=s?.data?s.data:s;return{income:(s?.income||[]).map(x=>({id:x.id||crypto.randomUUID(),name:x.name||x[0],icon:x.icon||x[1]||'💠'})),expense:(s?.expense||[]).map(x=>({id:x.id||crypto.randomUUID(),name:x.name||x[0],icon:x.icon||x[1]||'💠',group:x.group||x[3]||'Other',status:x.status||x[4]||'Pending'}))}}function key(y,m){return y+'-'+m}function initMonthly(d){let m={};years.forEach(y=>monthOnly.forEach(mm=>{m[key(y,mm)]={income:{},expense:{}};['income','expense'].forEach(t=>d[t].forEach(x=>{let old=(def[t].find(a=>a[0]===x.name)||[])[2]||0;m[key(y,mm)][t][x.id]=Math.round(old/12)}))}));return m}async function boot(){setCurrentMonth();yearSelect.value=selectedYear;await loadDB()}async function loadDB(){syncStatus.textContent='ฐานข้อมูล: กำลังโหลด...';try{let r=await fetch('/api/state',{cache:'no-store'});if(!r.ok)throw new Error(await r.text());let s=await r.json();data=norm(s.data||def);monthly=s.monthly||initMonthly(data);syncStatus.textContent='ฐานข้อมูล: โหลดสำเร็จ'}catch(e){data=norm(def);monthly=initMonthly(data);syncStatus.textContent='ฐานข้อมูล: ใช้ข้อมูลเริ่มต้น'}render()}async function saveDB(){syncStatus.textContent='ฐานข้อมูล: กำลังบันทึก...';try{await fetch('/api/state',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({data,monthly})});syncStatus.textContent='ฐานข้อมูล: บันทึกแล้ว'}catch(e){syncStatus.textContent='ฐานข้อมูล: บันทึกไม่สำเร็จ'}}const fmt=n=>Math.round(+n||0).toLocaleString('th-TH')+' บาท';function mv(t,id,y=selectedYear,m=selectedMonth){return +(monthly?.[key(y,m)]?.[t]?.[id]||0)}function smv(t,id,v,y=selectedYear,m=selectedMonth){monthly[key(y,m)] ||= {income:{},expense:{}};monthly[key(y,m)][t] ||= {};monthly[key(y,m)][t][id]=+v||0}function av(t,id,y=selectedYear){return monthOnly.reduce((s,m)=>s+mv(t,id,y,m),0)}function rows(t){return data[t].map(x=>({...x,amount:selectedMonth==='All'?av(t,x.id):mv(t,x.id)}))}function esc(s){return String(s).replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[m]))}function lbl(g){return `${th[g]||g} (${g})`}function renderMonths(){monthPanel.innerHTML=months.map(m=>`<button class="month ${m===selectedMonth?'active':''}" onclick="selectedMonth='${m}';render()">${m}</button>`).join('')}function renderTable(id,t,items){let total=items.reduce((s,x)=>s+x.amount,0);let body='';if(t==='expense'){groups.forEach(g=>{let a=items.filter(x=>x.group===g);if(!a.length)return;body+=`<tr class="group"><td colspan="3">${lbl(g)} <span style="float:right">${fmt(a.reduce((s,x)=>s+x.amount,0))}</span></td></tr>`+a.map(x=>`<tr><td>${esc(x.name)} <span class="tag ${x.status}">${x.status}</span></td><td>${fmt(x.amount)}</td><td><button onclick="openModal('${t}','${x.id}')">✏️</button><button onclick="del('${t}','${x.id}')">🗑️</button></td></tr>`).join('')})}else body=items.map(x=>`<tr><td>${esc(x.name)}</td><td>${fmt(x.amount)}</td><td><button onclick="openModal('${t}','${x.id}')">✏️</button><button onclick="del('${t}','${x.id}')">🗑️</button></td></tr>`).join('');document.getElementById(id).innerHTML=`<thead><tr><th>รายการ</th><th>Amount</th><th>จัดการ</th></tr></thead><tbody>${body}</tbody><tfoot><tr><td>Total</td><td>${fmt(total)}</td><td></td></tr></tfoot>`}function renderCards(id,items){document.getElementById(id).innerHTML=items.map(x=>`<div class="kpi"><div class="icon">${x.icon}</div><div class="label">${esc(x.name)}</div><div class="amt">${fmt(x.amount)}</div>${x.group?`<div>${lbl(x.group)}</div><div class="${x.status}">${x.status}</div>`:''}</div>`).join('')}function pie(ctx,labels,vals,title){return new Chart(ctx,{type:'pie',data:{labels:labels.length?labels:['ไม่มีข้อมูล'],datasets:[{data:vals.length?vals:[1]}]},options:{responsive:true,maintainAspectRatio:false,plugins:{title:{display:true,text:title,font:{size:18,weight:'bold'}},legend:{position:'left'}}}})}function render(){yearSelect.value=selectedYear;let inc=rows('income'),ex=rows('expense'),pending=groups.map(g=>({label:lbl(g),v:ex.filter(x=>x.group===g&&x.status==='Pending').reduce((s,x)=>s+x.amount,0)})).filter(x=>x.v),completed=groups.map(g=>({label:lbl(g),v:ex.filter(x=>x.group===g&&x.status==='Completed').reduce((s,x)=>s+x.amount,0)})).filter(x=>x.v);renderTable('incomeTable','income',inc);renderTable('expenseTable','expense',ex);renderCards('incomeCards',inc);renderCards('expenseCards',ex);Object.values(charts).forEach(c=>c.destroy());charts.a=pie(incomePie,inc.map(x=>x.name),inc.map(x=>x.amount),'สัดส่วนรายรับ');charts.b=pie(expensePie,pending.map(x=>x.label),pending.map(x=>x.v),'รายจ่าย Pending แยกตามกลุ่ม');charts.c=pie(expensePie2,completed.map(x=>x.label),completed.map(x=>x.v),'รายจ่าย Completed แยกตามกลุ่ม');incomeTotal.textContent='รวมรายรับ: '+fmt(inc.reduce((s,x)=>s+x.amount,0));expenseTotal.textContent='กลุ่มรายจ่าย Pending : '+fmt(pending.reduce((s,x)=>s+x.v,0));expenseTotal2.textContent='กลุ่มรายจ่าย Completed : '+fmt(completed.reduce((s,x)=>s+x.v,0));renderMonths()}function selectYear(y){selectedYear=y;render()}function fillGroups(){itemGroup.innerHTML=groups.map(g=>`<option value="${g}">${lbl(g)}</option>`).join('')}function toggleExpenseRows(){let e=itemType.value==='expense';groupRow.style.display=e?'grid':'none';statusRow.style.display=e?'grid':'none'}function openModal(t,id=''){fillGroups();editType.value=t;editId.value=id;itemType.value=t;toggleExpenseRows();let item=id?data[t].find(x=>x.id===id):null;modalTitle.textContent=(id?'แก้ไข ':'เพิ่ม ')+(t==='income'?'รายรับ':'รายจ่าย');itemName.value=item?.name||'';itemIcon.value=item?.icon||(t==='income'?'💰':'🧾');itemAmount.value=item?(selectedMonth==='All'?av(t,item.id):mv(t,item.id)):0;itemGroup.value=item?.group||'Other';itemCompleted.checked=(item?.status||'Pending')==='Completed';modal.showModal()}async function saveItem(e){e.preventDefault();let t=itemType.value,id=editId.value,old=editType.value,item={id:id||crypto.randomUUID(),name:itemName.value.trim(),icon:itemIcon.value.trim()||'💠'};if(t==='expense'){item.group=itemGroup.value;item.status=itemCompleted.checked?'Completed':'Pending'}if(id){data[old]=data[old].filter(x=>x.id!==id);data[t].push(item)}else data[t].push(item);let amount=+itemAmount.value||0;if(selectedMonth==='All')monthOnly.forEach(m=>smv(t,item.id,Math.round(amount/12),selectedYear,m));else smv(t,item.id,amount);modal.close();render();await saveDB()}async function del(t,id){if(confirm('ต้องการลบรายการนี้ใช่หรือไม่?')){data[t]=data[t].filter(x=>x.id!==id);Object.values(monthly).forEach(v=>{delete v[t]?.[id]});render();await saveDB()}}async function pullPrev(){if(selectedMonth==='All')return alert('กรุณาเลือกเดือน');let i=monthOnly.indexOf(selectedMonth),p=i>0?{y:selectedYear,m:monthOnly[i-1]}:{y:String(+selectedYear-1),m:'Dec'};if(+p.y<2026)return alert('ไม่มีเดือนก่อนหน้า');['income','expense'].forEach(t=>data[t].forEach(x=>smv(t,x.id,mv(t,x.id,p.y,p.m))));render();await saveDB()}function exportImage(){let c=document.createElement('canvas');c.width=1080;c.height=1200;let g=c.getContext('2d');g.fillStyle='#f7fafb';g.fillRect(0,0,c.width,c.height);g.fillStyle='#263238';g.textAlign='center';g.font='800 58px Tahoma';g.fillText('บัญชีรายรับ-รายจ่าย',540,90);g.font='700 34px Tahoma';g.fillText('Export จาก Dashboard',540,145);let a=document.createElement('a');a.href=c.toDataURL('image/png');a.download=`dashboard_${selectedYear}_${selectedMonth}.png`;a.click()}</script></body></html>
