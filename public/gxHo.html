<!doctype html>
<html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>บัญชีรายรับ-รายจ่าย</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap');
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:"TH Sarabun New",Sarabun,Tahoma,sans-serif;background:#eef3f5;color:#243238;font-size:22px}button,input,select{font-family:inherit;font-size:20px}.hide{display:none!important}.login{min-height:100dvh;display:grid;place-items:center;padding:16px;background:linear-gradient(135deg,#55d0b8,#ffaaa0)}.login-card{width:min(420px,94vw);background:#fff;border:3px solid #222;border-radius:18px;padding:24px;box-shadow:0 18px 50px #0005}.login-card h1{text-align:center;margin:0 0 16px;font-size:34px}.login-row{display:grid;gap:4px;margin:12px 0}.login-row label{font-weight:800}.login-row input{border:1px solid #b8c8c8;border-radius:10px;padding:10px 12px;font-size:22px}.err{color:#b00020;text-align:center;font-weight:800;min-height:26px}.app{height:100dvh;display:grid;grid-template-rows:auto 1fr;gap:8px;padding:8px}.top{display:flex;gap:8px;align-items:center;justify-content:space-between;background:#fff;border:2px solid #222;border-radius:10px;padding:8px;overflow:auto}.top h1{margin:0;font-size:32px;white-space:nowrap}.btn{border:1px solid #9aa;border-radius:8px;background:#fff;padding:5px 10px;font-weight:800;cursor:pointer;white-space:nowrap}.incomeBtn{background:#dff8f3;color:#087363}.expenseBtn{background:#ffe4e0;color:#9b3931}.warn{background:#fff6d7}.danger{background:#ffe4e4;color:#ad1515}.dark{background:#222;color:#fff}.info{background:#e8f1ff;color:#134d91}.mobileOn{background:#dcecff;color:#004b8d;border-color:#6aa3d8}.layout{min-height:0;display:grid;grid-template-columns:70px 1fr;border:3px solid #222;background:#fff}.months{padding:7px;background:#faffff;border-right:2px solid #ccd8d8;overflow:auto}.month{display:block;width:100%;margin:4px 0;padding:5px 2px;border:1px solid #69c3b3;border-radius:6px;background:#e0f8f3;color:#177666;font-weight:800;cursor:pointer}.month.active{background:#4ecbb2;color:white}.dash{min-height:0;display:grid;grid-template-rows:1fr 1fr;gap:6px;background:#222}.sec{min-height:0;background:#fff;display:grid;grid-template-columns:390px 1.2fr 1fr 1fr;grid-template-rows:48px 1fr;overflow:hidden}.title{grid-column:1/-1;text-align:center;font-size:36px;font-weight:900;padding:5px}.income .title{background:#55d0b8}.expense .title{background:#ffaaa0}.box{min-height:0;overflow:auto;border-right:2px solid #ccd8d8;padding:8px}.box:last-child{border-right:0}.cards{display:grid;grid-template-columns:repeat(4,minmax(100px,1fr));gap:10px;background:#e8fbf7}.expense .cards{background:#fff1ef}.kpi{text-align:center;min-width:0}.icon{font-size:42px;line-height:1}.label{display:inline-block;background:white;border:1px solid #d4c1c1;border-radius:6px;padding:2px 8px;font-weight:800;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.amt{font-size:23px;font-weight:900;margin-top:6px;white-space:nowrap}.group-small,.status-small{font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.group-small{color:#775050}.pending{color:#b57600}.completed{color:#16823a}table{width:100%;border-collapse:collapse;font-size:18px;table-layout:fixed}th,td{border:1px solid #d7e2e2;padding:5px}th{background:#bceee4;text-align:left}.expense th{background:#ffd8d2}td:nth-child(2),th:nth-child(2){width:118px;text-align:right;white-space:nowrap}td:nth-child(3),th:nth-child(3){width:98px;text-align:center}.group-row td{background:#fff1da!important;color:#795100;font-weight:900}.group-row .subtotal{float:right}.tag{font-size:14px;border-radius:999px;padding:0 7px;margin-left:3px}.tag.pending{background:#fff2ce;color:#9b6200}.tag.completed{background:#dff8e9;color:#14733a}tfoot td{font-weight:900;background:#d9f8f0}.expense tfoot td{background:#ffe2de}canvas{width:100%!important;height:calc(100% - 48px)!important}.pill{border:1px solid #ccd8d8;background:white;border-radius:999px;text-align:center;font-weight:800;padding:2px;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}dialog{border:0;border-radius:14px;box-shadow:0 18px 55px #0006;width:min(620px,94vw);padding:0}.mh{background:#222;color:white;font-size:28px;font-weight:800;padding:10px 14px}.mb{padding:14px;display:grid;gap:10px}.row{display:grid;grid-template-columns:180px 1fr;gap:8px;align-items:center}.row input,.row select{width:100%;padding:7px;border:1px solid #c7d2d2;border-radius:8px}.checkrow{display:flex;gap:8px;align-items:center}.checkrow input{width:22px;height:22px}.hint{font-size:17px;color:#667}.ma{padding:10px 14px;text-align:right;border-top:1px solid #eee}.force-mobile .app{height:auto;min-height:100dvh}.force-mobile .top{position:sticky;top:0;z-index:5;flex-wrap:wrap;border-radius:0}.force-mobile .layout{grid-template-columns:1fr;border-width:2px}.force-mobile .months{display:flex;gap:6px;overflow-x:auto;overflow-y:hidden;border-right:0;border-bottom:2px solid #ccd8d8;padding:7px;position:sticky;top:74px;z-index:4}.force-mobile .month{width:auto;min-width:58px;margin:0;padding:6px 10px}.force-mobile .dash{grid-template-rows:auto auto}.force-mobile .sec{grid-template-columns:1fr;grid-template-rows:auto auto auto 330px 330px;overflow:visible}.force-mobile .box{border-right:0;border-bottom:1px solid #ccd8d8;min-height:220px}.force-mobile .cards{grid-template-columns:repeat(2,minmax(140px,1fr));max-height:none}.force-mobile .title{font-size:30px}.force-mobile canvas{height:260px!important}.force-mobile table{min-width:560px}@media(max-width:1180px){html,body{overflow:auto}.app{height:auto;min-height:100dvh}.top{position:sticky;top:0;z-index:5;flex-wrap:wrap}.layout{grid-template-columns:1fr;border-width:2px}.months{display:flex;gap:6px;overflow-x:auto;overflow-y:hidden;border-right:0;border-bottom:2px solid #ccd8d8;padding:7px;position:sticky;top:72px;z-index:4}.month{width:auto;min-width:58px;margin:0;padding:6px 10px}.dash{grid-template-rows:auto auto}.sec{grid-template-columns:1fr;grid-template-rows:auto auto auto 330px 330px;overflow:visible}.box{border-right:0;border-bottom:1px solid #ccd8d8;min-height:220px}.cards{grid-template-columns:repeat(2,minmax(140px,1fr));max-height:none}.title{font-size:30px}canvas{height:260px!important}table{min-width:560px}.top h1{font-size:28px}}@media(max-width:640px){body{font-size:20px}.app{padding:4px;gap:5px}.top{align-items:flex-start;gap:5px;border-radius:0}.top h1{font-size:25px;width:100%}.top .btn,.top select{font-size:18px;padding:5px 8px}.months{top:118px;padding:6px 4px}.force-mobile .months{top:118px}.month{font-size:17px;min-width:50px}.sec{grid-template-rows:auto auto auto 300px 300px}.title{font-size:24px}.cards{grid-template-columns:1fr}.force-mobile .cards{grid-template-columns:1fr}.box{padding:6px;min-height:180px}.icon{font-size:38px}.amt{font-size:22px}.row{grid-template-columns:1fr}.mh{font-size:24px}.login-card{padding:18px}.login-card h1{font-size:30px}td:nth-child(2),th:nth-child(2){width:112px}td:nth-child(3),th:nth-child(3){width:92px}}</style></head><body><section id="loginPage" class="login"><form class="login-card" onsubmit="login(event)"><h1>เข้าสู่ระบบ</h1><div class="login-row"><label>User</label><input id="loginUser" autocomplete="username" required placeholder="admin"></div><div class="login-row"><label>Password</label><input id="loginPass" type="password" autocomplete="current-password" required placeholder="password"></div><button class="btn dark" style="width:100%;font-size:24px;padding:8px" type="submit">Login</button><div id="loginError" class="err"></div></form></section><div id="app" class="app hide"><div class="top"><h1>บัญชีรายรับ-รายจ่าย</h1><div><label>ปี </label><select id="yearSelect" onchange="selectYear(this.value)"><option>2026</option><option>2027</option><option>2028</option><option>2029</option></select></div><button class="btn mobileOn" id="mobileBtn" onclick="toggleMobileView()">แสดงบนมือถือ</button><button class="btn incomeBtn" onclick="openModal('income')">+ รายรับ</button><button class="btn expenseBtn" onclick="openModal('expense')">+ รายจ่าย</button><button class="btn info" onclick="pullPrev()">ดึงเดือนก่อนหน้า</button><button class="btn warn" onclick="exportImage()">Export รูปภาพ</button><button class="btn" onclick="logout()">Logout</button></div><div class="layout"><aside class="months" id="monthPanel"></aside><main class="dash"><section class="sec income"><div class="title" id="incomeTitle"></div><div class="box"><table id="incomeTable"></table></div><div class="box cards" id="incomeCards"></div><div class="box"><canvas id="incomePie"></canvas><div class="pill" id="incomeTotal"></div></div><div class="box"><canvas id="incomeBar"></canvas><div class="pill" id="incomeTop"></div></div></section><section class="sec expense"><div class="title" id="expenseTitle"></div><div class="box"><table id="expenseTable"></table></div><div class="box cards" id="expenseCards"></div><div class="box"><canvas id="expensePie"></canvas><div class="pill" id="expenseTotal"></div></div><div class="box"><canvas id="expenseBar"></canvas><div class="pill" id="expenseTop"></div></div></section></main></div></div><dialog id="itemModal"><form method="dialog" onsubmit="saveItem(event)"><div class="mh" id="modalTitle"></div><div class="mb"><input type="hidden" id="editType"><input type="hidden" id="editId"><div class="row"><label>ประเภท</label><select id="itemType" onchange="toggleExpenseRows()"><option value="income">รายรับ</option><option value="expense">รายจ่าย</option></select></div><div class="row" id="groupRow"><label>กลุ่มรายจ่าย</label><select id="itemGroup"></select></div><div class="row" id="statusRow"><label>Status</label><label class="checkrow"><input id="itemCompleted" type="checkbox"> Completed <span style="font-size:16px;color:#777">(ไม่ติ๊ก = Pending)</span></label></div><div class="row"><label>ชื่อรายการ</label><input id="itemName" required></div><div class="row"><label>จำนวนเงิน</label><input id="itemAmount" type="number" min="0" step="1" required></div><div class="row"><label>ไอคอน</label><input id="itemIcon"></div><div class="hint" id="modalHint"></div></div><div class="ma"><button class="btn" type="button" onclick="itemModal.close()">ยกเลิก</button><button class="btn dark" type="submit">บันทึก</button></div></form></dialog><script>const AUTH_USER='admin',AUTH_PASS='siriphan';function login(e){e.preventDefault();if(loginUser.value===AUTH_USER&&loginPass.value===AUTH_PASS){sessionStorage.setItem('gxHoLogin','ok');loginPage.classList.add('hide');app.classList.remove('hide');render()}else loginError.textContent='User หรือ Password ไม่ถูกต้อง'}function logout(){sessionStorage.removeItem('gxHoLogin');location.reload()}function toggleMobileView(){document.body.classList.toggle('force-mobile');mobileBtn.textContent=document.body.classList.contains('force-mobile')?'ปิดโหมดมือถือ':'แสดงบนมือถือ';setTimeout(()=>Object.values(charts).forEach(c=>c.resize()),50)}window.addEventListener('load',()=>{if(sessionStorage.getItem('gxHoLogin')==='ok'){loginPage.classList.add('hide');app.classList.remove('hide');render()}});const years=['2026','2027','2028','2029'],months=['All','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],monthOnly=months.slice(1),thMonth={All:'ทั้งปี',Jan:'มกราคม',Feb:'กุมภาพันธ์',Mar:'มีนาคม',Apr:'เมษายน',May:'พฤษภาคม',Jun:'มิถุนายน',Jul:'กรกฎาคม',Aug:'สิงหาคม',Sep:'กันยายน',Oct:'ตุลาคม',Nov:'พฤศจิกายน',Dec:'ธันวาคม'};const expenseGroups=['Essential Expenses','Financial Expenses','Self-Development','Personal Expenses','Health','Family','Variable / Emergency','Savings & Investment','Other'];const groupTH={'Essential Expenses':'ค่าใช้จ่ายจำเป็น','Financial Expenses':'ภาระทางการเงิน','Self-Development':'พัฒนาตนเอง','Personal Expenses':'ค่าใช้จ่ายส่วนตัว','Health':'สุขภาพ','Family':'ครอบครัว','Variable / Emergency':'ผันแปร/ฉุกเฉิน','Savings & Investment':'ออมและลงทุน','Other':'อื่น ๆ'};const def={income:[['Salary','💰',614400],['Freelance','👨‍💻',635552],['Interest','📈',46041],['Bonus','💵',92260],['Investment','📊',36291],['Overtime','⏱️',44960],['Profit','💲',50301],['Dividend','🧾',28021]],expense:[['Bills','🧾',190555,'Essential Expenses','Pending'],['Dining','🍽️',121070,'Personal Expenses','Pending'],['Education','🎓',119852,'Self-Development','Pending'],['Health Care','🏥',67604,'Health','Pending'],['Rent','🏠',348000,'Essential Expenses','Pending'],['Shopping','🛒',243722,'Personal Expenses','Pending'],['Transport','🚗',105643,'Essential Expenses','Pending'],['Travel','✈️',118078,'Variable / Emergency','Pending']]};const pal={income:['#3e60ca','#38bed7','#79d45f','#f6c638','#ff8432','#00a68f','#138bc5','#e84b75'],expense:['#4169c7','#35b7c3','#9cdb62','#7bd0b8','#ff7b34','#f24d40','#377dc5','#0092a8','#8e44ad']};let selectedMonth='All',selectedYear='2026',charts={},data=loadData(),monthly=loadMonthly();function norm(raw){let s=raw.data?raw.data:raw;return{income:(s.income||[]).map(x=>({id:x.id||crypto.randomUUID(),name:x.name||x[0],icon:x.icon||x[1]||'💠'})),expense:(s.expense||[]).map(x=>({id:x.id||crypto.randomUUID(),name:x.name||x[0],icon:x.icon||x[1]||'💠',group:x.group||x[3]||'Other',status:x.status||x[4]||'Pending'}))}}function initMonthly(d){let m={};years.forEach(y=>monthOnly.forEach(mm=>{let k=key(y,mm);m[k]={income:{},expense:{}};['income','expense'].forEach(t=>d[t].forEach(x=>{let old=(def[t].find(a=>a[0]===x.name)||[])[2]||0;m[k][t][x.id]=Math.round(old/12)}))}));return m}function loadData(){try{let s=JSON.parse(localStorage.getItem('incomeExpenseWorkersData')||'null');if(s)return norm(s)}catch(e){}return norm(def)}function loadMonthly(){try{let s=JSON.parse(localStorage.getItem('incomeExpenseWorkersMonthly')||'null');if(s)return s}catch(e){}return initMonthly(loadData())}function save(){localStorage.setItem('incomeExpenseWorkersData',JSON.stringify(data));localStorage.setItem('incomeExpenseWorkersMonthly',JSON.stringify(monthly))}const fmt=n=>Math.round(Number(n)||0).toLocaleString('th-TH')+' บาท';function key(y,m){return y+'-'+m}function monthVal(type,id,y,m){return Number(monthly[key(y,m)]?.[type]?.[id])||0}function setMonthVal(type,id,y,m,v){let k=key(y,m);monthly[k]=monthly[k]||{income:{},expense:{}};monthly[k][type]=monthly[k][type]||{};monthly[k][type][id]=Number(v)||0}function annualVal(type,id,y){return monthOnly.reduce((s,m)=>s+monthVal(type,id,y,m),0)}function adj(type,y=selectedYear,m=selectedMonth){return data[type].map(x=>({...x,displayAmount:m==='All'?annualVal(type,x.id,y):monthVal(type,x.id,y,m)}))}function esc(s){return String(s).replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[m]))}function shortLabel(g){return `${groupTH[g]||g} (${g})`}function renderMonths(){monthPanel.innerHTML=months.map(m=>`<button class="month ${selectedMonth===m?'active':''}" onclick="selectMonth('${m}')">${m}</button>`).join('')}function groupTotals(items,status=null){return expenseGroups.map(g=>({name:g,label:shortLabel(g),displayAmount:items.filter(x=>(x.group||'Other')===g&&(!status||x.status===status)).reduce((s,x)=>s+x.displayAmount,0)})).filter(x=>x.displayAmount>0)}function table(id,type,title,items){let total=items.reduce((s,x)=>s+x.displayAmount,0);if(type==='expense'){let rows='';expenseGroups.forEach(g=>{let arr=items.filter(x=>(x.group||'Other')===g);if(!arr.length)return;let sub=arr.reduce((s,x)=>s+x.displayAmount,0);rows+=`<tr class="group-row"><td colspan="3">${esc(shortLabel(g))} <span class="subtotal">${fmt(sub)}</span></td></tr>`+arr.map(x=>`<tr><td>${esc(x.name)} <span class="tag ${x.status==='Completed'?'completed':'pending'}">${x.status}</span></td><td>${fmt(x.displayAmount)}</td><td><button class="btn" onclick="openModal('expense','${x.id}')">✏️</button><button class="btn danger" onclick="del('expense','${x.id}')">🗑️</button></td></tr>`).join('')});document.getElementById(id).innerHTML=`<thead><tr><th>${title}</th><th>AMOUNT</th><th>จัดการ</th></tr></thead><tbody>${rows}</tbody><tfoot><tr><td>TOTAL</td><td>${fmt(total)}</td><td></td></tr></tfoot>`;return}document.getElementById(id).innerHTML=`<thead><tr><th>${title}</th><th>AMOUNT</th><th>จัดการ</th></tr></thead><tbody>`+items.map(x=>`<tr><td>${esc(x.name)}</td><td>${fmt(x.displayAmount)}</td><td><button class="btn" onclick="openModal('${type}','${x.id}')">✏️</button><button class="btn danger" onclick="del('${type}','${x.id}')">🗑️</button></td></tr>`).join('')+`</tbody><tfoot><tr><td>TOTAL</td><td>${fmt(total)}</td><td></td></tr></tfoot>`}function cards(id,items){document.getElementById(id).innerHTML=items.map(x=>`<div class="kpi"><div class="icon">${x.icon}</div><div class="label">${esc(x.name)}</div><div class="amt">${fmt(x.displayAmount)}</div>${x.group?`<div class="group-small">${esc(shortLabel(x.group))}</div><div class="status-small ${x.status==='Completed'?'completed':'pending'}">${x.status}</div>`:''}</div>`).join('')}function pie(ctx,labels,vals,palette,title=''){return new Chart(ctx,{type:'pie',data:{labels:labels.length?labels:['ไม่มีข้อมูล'],datasets:[{data:vals.length?vals:[1],backgroundColor:labels.length?labels.map((_,i)=>palette[i%palette.length]):['#ddd'],borderColor:'#fff',borderWidth:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{title:{display:!!title,text:title,font:{family:'Sarabun',size:18,weight:'800'},color:'#263238'},legend:{position:'left',labels:{boxWidth:14,font:{family:'Sarabun',size:14}}},tooltip:{callbacks:{label:c=>labels.length?`${c.label}: ${fmt(c.raw)}`:'ไม่มีข้อมูล'}}}}})}function bar(ctx,labels,vals,color,title=''){return new Chart(ctx,{type:'bar',data:{labels,datasets:[{data:vals,backgroundColor:color}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},title:{display:!!title,text:title,font:{family:'Sarabun',size:18,weight:'800'}}},scales:{x:{grid:{display:false}},y:{grid:{display:false},ticks:{font:{family:'Sarabun',size:14}}}}}})}function render(){incomeTitle.textContent='รายรับ';expenseTitle.textContent='รายจ่าย';let inc=adj('income'),ex=adj('expense'),pending=groupTotals(ex,'Pending'),completed=groupTotals(ex,'Completed');table('incomeTable','income','รายรับ',inc);table('expenseTable','expense','กลุ่มรายจ่าย / รายจ่าย',ex);cards('incomeCards',inc);cards('expenseCards',ex);Object.values(charts).forEach(c=>c.destroy());charts.ip=pie(incomePie,inc.map(x=>x.name),inc.map(x=>x.displayAmount),pal.income,'สัดส่วนรายรับ');charts.ib=bar(incomeBar,inc.map(x=>x.name),inc.map(x=>x.displayAmount),'#55d0b8','ยอดรายรับ');charts.ep=pie(expensePie,pending.map(x=>x.label),pending.map(x=>x.displayAmount),pal.expense,'รายจ่าย Pending แยกตามกลุ่ม');charts.eb=pie(expenseBar,completed.map(x=>x.label),completed.map(x=>x.displayAmount),pal.expense,'รายจ่าย Completed แยกตามกลุ่ม');let it=inc.reduce((s,x)=>s+x.displayAmount,0),pt=pending.reduce((s,x)=>s+x.displayAmount,0),ct=completed.reduce((s,x)=>s+x.displayAmount,0);incomeTotal.textContent='รวมรายรับ: '+fmt(it);incomeTop.textContent='รายรับสูงสุด: '+(inc.sort((a,b)=>b.displayAmount-a.displayAmount)[0]?.name||'-');expenseTotal.textContent='กลุ่มรายจ่าย Pending : '+fmt(pt);expenseTop.textContent='กลุ่มรายจ่าย Completed : '+fmt(ct);renderMonths()}function selectYear(y){selectedYear=String(y);render()}function selectMonth(m){selectedMonth=m;render()}function prev(){if(selectedMonth==='All')return null;let i=monthOnly.indexOf(selectedMonth);if(i>0)return{y:selectedYear,m:monthOnly[i-1]};let py=String(Number(selectedYear)-1);return Number(py)<2026?null:{y:py,m:'Dec'}}function pullPrev(){let p=prev();if(!p){alert('กรุณาเลือกเดือน Feb-Dec หรือ Jan ปี 2027 ขึ้นไป');return}['income','expense'].forEach(t=>data[t].forEach(x=>setMonthVal(t,x.id,selectedYear,selectedMonth,monthVal(t,x.id,p.y,p.m))));save();render();alert(`ดึงข้อมูลจาก ${p.m} ${p.y} แล้ว`)}function toggleExpenseRows(){let is=itemType.value==='expense';groupRow.style.display=is?'grid':'none';statusRow.style.display=is?'grid':'none'}function fillGroups(){itemGroup.innerHTML=expenseGroups.map(g=>`<option value="${esc(g)}">${esc(shortLabel(g))}</option>`).join('')}function openModal(type='income',id=''){fillGroups();editType.value=type;editId.value=id;itemType.value=type;toggleExpenseRows();let item=id?data[type].find(x=>x.id===id):null;modalTitle.textContent=(id?'แก้ไข ':'เพิ่ม ')+(type==='income'?'รายรับ':'รายจ่าย');itemName.value=item?item.name:'';itemGroup.value=item?.group||'Other';itemCompleted.checked=(item?.status||'Pending')==='Completed';itemIcon.value=item?item.icon:(type==='income'?'💰':'🧾');itemAmount.value=item?(selectedMonth==='All'?annualVal(type,item.id,selectedYear):monthVal(type,item.id,selectedYear,selectedMonth)):0;modalHint.textContent=type==='expense'?'Status เริ่มต้นคือ Pending ถ้าติ๊กช่อง Completed จะถูกนับในกราฟ Completed':(selectedMonth==='All'?'โหมด All: จำนวนเงินที่บันทึกจะถูกหารเฉลี่ย 12 เดือน':'โหมดรายเดือน: บันทึกเฉพาะเดือน '+selectedMonth+' '+selectedYear);itemModal.showModal()}function saveItem(e){e.preventDefault();let old=editType.value,id=editId.value,type=itemType.value,item={id:id||crypto.randomUUID(),name:itemName.value.trim(),icon:itemIcon.value.trim()||'💠'};if(type==='expense'){item.group=itemGroup.value||'Other';item.status=itemCompleted.checked?'Completed':'Pending'}if(id){data[old]=data[old].filter(x=>x.id!==id);data[type].push(item)}else data[type].push(item);let amount=Number(itemAmount.value)||0;if(selectedMonth==='All'){let each=Math.round(amount/12);monthOnly.forEach(m=>setMonthVal(type,item.id,selectedYear,m,each))}else setMonthVal(type,item.id,selectedYear,selectedMonth,amount);save();itemModal.close();render()}function del(t,id){if(confirm(t==='expense'?'ต้องการลบรายจ่ายนี้ใช่หรือไม่?':'ต้องการลบรายการนี้ใช่หรือไม่?')){data[t]=data[t].filter(x=>x.id!==id);Object.values(monthly).forEach(v=>{if(v[t])delete v[t][id]});save();render()}}function exportImage(){let inc=adj('income'),ex=adj('expense'),it=inc.reduce((s,x)=>s+x.displayAmount,0),et=ex.reduce((s,x)=>s+x.displayAmount,0),net=it-et;let c=document.createElement('canvas'),w=1080,h=1700;c.width=w;c.height=h;let g=c.getContext('2d');g.fillStyle='#f7fafb';g.fillRect(0,0,w,h);g.fillStyle='#263238';g.textAlign='center';g.font='800 58px Sarabun, Arial';g.fillText('บัญชีรายรับ-รายจ่าย',w/2,85);function card(x,y,title,val,color){g.fillStyle=color;g.fillRect(x,y,310,96);g.fillStyle='#fff';g.font='700 27px Sarabun, Arial';g.textAlign='center';g.fillText(title,x+155,y+35);g.font='800 31px Sarabun, Arial';g.fillText(fmt(val),x+155,y+74)}card(50,135,'รายรับ',it,'#42bda8');card(385,135,'รายจ่าย',et,'#f08f86');card(720,135,'คงเหลือ',net,net>=0?'#3e8ed0':'#d9534f');let a=document.createElement('a');a.href=c.toDataURL('image/png');a.download=`บัญชีรายรับรายจ่าย_${selectedYear}_${selectedMonth}.png`;a.click()}</script></body></html>
