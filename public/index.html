<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>บัญชีรายรับ-รายจ่าย</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap');*{box-sizing:border-box}body{margin:0;font-family:Sarabun,Tahoma,sans-serif;background:#eef3f5;color:#213238;font-size:18px}button,input,select{font-family:inherit;font-size:16px}.hide{display:none!important}.login{min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#55d0b8,#ffaaa0);padding:16px}.login-card{width:min(420px,94vw);background:#fff;border:3px solid #222;border-radius:18px;padding:22px;box-shadow:0 16px 44px #0005}.login-card h1{text-align:center;margin:0 0 16px}.login-row{display:grid;gap:5px;margin:12px 0}.login-row input{padding:10px;border:1px solid #b8c8c8;border-radius:10px}.err{color:#b00020;text-align:center;font-weight:800;min-height:24px}.app{height:100vh;display:grid;grid-template-rows:auto auto 1fr;gap:6px;padding:6px}.top{display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:#fff;border:2px solid #222;border-radius:10px;padding:7px}.top h1{font-size:30px;margin:0 8px 0 0}.btn{border:1px solid #9aa;border-radius:8px;background:#fff;padding:6px 10px;font-weight:800;cursor:pointer}.incomeBtn{background:#dff8f3;color:#087363}.expenseBtn{background:#ffe4e0;color:#9b3931}.warn{background:#fff6d7}.info{background:#e8f1ff}.dark{background:#222;color:#fff}.sync{font-size:13px;color:#526}.months{display:flex;gap:6px;overflow-x:auto;background:#faffff;border:2px solid #222;border-radius:8px;padding:6px}.month{min-width:52px;border:1px solid #aaa;border-radius:7px;background:#fff;padding:6px 9px;font-weight:700}.month.active{background:#4ecbb2;color:#fff;border-color:#4ecbb2}.dash{min-height:0;display:grid;grid-template-rows:1fr 1fr;gap:6px}.section{min-height:0;background:#fff;border:2px solid #222;display:grid;grid-template-rows:auto 1fr}.section-title{text-align:center;font-size:28px;font-weight:900;padding:7px}.income .section-title{background:#55d0b8}.expense .section-title{background:#ffaaa0}.body{min-height:0;display:grid;grid-template-columns:minmax(360px,34%) minmax(260px,26%) 1fr;gap:8px;padding:8px;overflow:hidden}.panel{min-height:0;overflow:auto}.cards{display:grid;grid-template-columns:repeat(2,minmax(120px,1fr));gap:8px;align-content:start}.kpi{text-align:center;border:1px solid #d7caca;border-radius:10px;background:#f7ffff;padding:8px}.expense .kpi{background:#fff4f2}.icon{font-size:34px}.label{display:inline-block;border:1px solid #d4bfc0;background:#fff;border-radius:6px;padding:2px 7px;font-weight:800;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.amt{font-size:20px;font-weight:900;margin-top:5px}.small{font-size:12px;color:#765;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.pending{color:#b57600}.completed{color:#16823a}.chart-grid{height:100%;min-height:260px;display:grid;grid-template-columns:1fr 1fr;gap:8px}.chart-card{min-height:260px;display:grid;grid-template-rows:minmax(220px,1fr) auto;border-left:1px solid #d5e0e0;padding:4px}canvas{width:100%!important;height:100%!important;min-height:220px}.pill{border:1px solid #ccd8d8;border-radius:999px;text-align:center;font-weight:800;padding:5px;margin-top:5px;background:#fff}table{width:100%;border-collapse:collapse;font-size:15px;table-layout:fixed}th,td{border:1px solid #d7e2e2;padding:6px}th{background:#d8f5ee;text-align:left}.expense th{background:#ffd8d2}td:nth-child(2),th:nth-child(2){width:105px;text-align:right}td:nth-child(3),th:nth-child(3){width:78px;text-align:center}td:nth-child(4),th:nth-child(4){width:92px;text-align:center}.group-row td{background:#fff1da!important;color:#795100;font-weight:900}.tag{font-size:12px;border-radius:999px;padding:1px 6px}.tag.Pending{background:#fff2ce;color:#9b6200}.tag.Completed{background:#dff8e9;color:#14733a}tfoot td{font-weight:900;background:#e5faf4}.expense tfoot td{background:#ffe8e4}dialog{border:0;border-radius:14px;box-shadow:0 18px 55px #0006;width:min(570px,94vw);padding:0}.mh{background:#222;color:#fff;font-size:24px;font-weight:900;padding:10px 14px}.mb{display:grid;gap:10px;padding:14px}.form-row{display:grid;grid-template-columns:150px 1fr;gap:8px;align-items:center}.form-row input,.form-row select{width:100%;padding:8px;border:1px solid #c7d2d2;border-radius:8px}.ma{text-align:right;border-top:1px solid #eee;padding:10px}@media(max-width:1100px){body{overflow:auto}.app{height:auto}.dash{grid-template-rows:auto auto}.body{grid-template-columns:1fr;overflow:visible}.cards{grid-template-columns:repeat(2,minmax(130px,1fr))}.chart-grid{grid-template-columns:1fr;height:auto}.chart-card{min-height:320px}.panel{min-height:180px}table{min-width:620px}.top{position:sticky;top:0;z-index:3}}@media(max-width:640px){.top h1{width:100%;font-size:25px}.top .btn,.top select{font-size:14px;padding:5px 7px}.cards{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}.chart-card{min-height:280px}.body{padding:5px}.section-title{font-size:22px}}</style></head><body><section id="loginPage" class="login"><form class="login-card" onsubmit="login(event)"><h1>เข้าสู่ระบบ</h1><div class="login-row"><label>User</label><input id="loginUser" required></div><div class="login-row"><label>Password</label><input id="loginPass" type="password" required></div><button class="btn dark" style="width:100%;font-size:22px">Login</button><div id="loginError" class="err"></div></form></section><main id="app" class="app hide"><div class="top"><h1>บัญชีรายรับ-รายจ่าย</h1><label>ปี <select id="yearSelect" onchange="selectYear(this.value)"><option>2026</option><option>2027</option><option>2028</option><option>2029</option></select></label><button class="btn incomeBtn" onclick="openModal('income')">+ รายรับ</button><button class="btn expenseBtn" onclick="openModal('expense')">+ รายจ่าย</button><button class="btn info" onclick="pullPrev()">ดึงเดือนก่อนหน้า</button><button class="btn warn" onclick="exportImage()">Export รูปภาพ</button><button class="btn" onclick="loadDB()">โหลดข้อมูลล่าสุด</button><span class="sync" id="syncStatus">ฐานข้อมูล: ไม่มีรีเฟรชอัตโนมัติ</span><button class="btn" onclick="logout()">Logout</button></div><div id="monthPanel" class="months"></div><div class="dash"><section class="section income"><div class="section-title">รายรับ</div><div class="body"><div class="panel"><table id="incomeTable"></table></div><div class="panel cards" id="incomeCards"></div><div class="chart-grid"><div class="chart-card"><canvas id="incomePie"></canvas><div class="pill" id="incomeTotal"></div></div><div class="chart-card"><canvas id="incomeBar"></canvas><div class="pill" id="incomeTop"></div></div></div></div></section><section class="section expense"><div class="section-title">รายจ่าย</div><div class="body"><div class="panel"><table id="expenseTable"></table></div><div class="panel cards" id="expenseCards"></div><div class="chart-grid"><div class="chart-card"><canvas id="expensePie"></canvas><div class="pill" id="expenseTotal"></div></div><div class="chart-card"><canvas id="expensePie2"></canvas><div class="pill" id="expenseTotal2"></div></div></div></div></section></div></main><dialog id="modal"><form method="dialog" onsubmit="saveItem(event)"><div class="mh" id="modalTitle"></div><div class="mb"><input type="hidden" id="editId"><div class="form-row"><label>ประเภท</label><select id="itemType" onchange="toggleExpenseRows()"><option value="income">รายรับ</option><option value="expense">รายจ่าย</option></select></div><div class="form-row"><label>เดือน</label><select id="itemMonth"></select></div><div class="form-row" id="groupRow"><label>กลุ่มรายจ่าย</label><select id="itemGroup"></select></div><div class="form-row" id="statusRow"><label>Status</label><label><input id="itemCompleted" type="checkbox"> Completed <span style="font-size:13px;color:#777">ไม่ติ๊ก = Pending</span></label></div><div class="form-row"><label>ชื่อรายการ</label><input id="itemName" required></div><div class="form-row"><label>จำนวนเงิน</label><input id="itemAmount" type="number" min="0" step="1" required></div><div class="form-row"><label>ไอคอน</label><input id="itemIcon"></div><div style="font-size:13px;color:#667">ไม่มี refresh อัตโนมัติ — บันทึกแล้วอัปเดตหน้าปัจจุบันเท่านั้น</div></div><div class="ma"><button class="btn" type="button" onclick="modal.close()">ยกเลิก</button><button class="btn dark">บันทึก</button></div></form></dialog><script>
const AUTH_USER='admin',AUTH_PASS='siriphan';const years=['2026','2027','2028','2029'],months=['All','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],monthOnly=months.slice(1);const groups=['Essential Expenses','Financial Expenses','Self-Development','Personal Expenses','Health','Family','Variable / Emergency','Savings & Investment','Other'];const th={'Essential Expenses':'ค่าใช้จ่ายจำเป็น','Financial Expenses':'ภาระทางการเงิน','Self-Development':'พัฒนาตนเอง','Personal Expenses':'ค่าใช้จ่ายส่วนตัว','Health':'สุขภาพ','Family':'ครอบครัว','Variable / Emergency':'ผันแปร/ฉุกเฉิน','Savings & Investment':'ออมและลงทุน','Other':'อื่น ๆ'};const defaults=[['income','Salary','💰',51200,null,null],['income','Freelance','👨‍💻',0,null,null],['expense','Rent','🏠',29000,'Essential Expenses','Pending'],['expense','ค่าไฟ','🧾',2500,'Essential Expenses','Completed']];let selectedYear,selectedMonth,records=[],charts={};
function login(e){e.preventDefault();if(loginUser.value===AUTH_USER&&loginPass.value===AUTH_PASS){sessionStorage.setItem('ok','1');loginPage.classList.add('hide');app.classList.remove('hide');boot()}else loginError.textContent='User หรือ Password ไม่ถูกต้อง'}function logout(){sessionStorage.removeItem('ok');location.reload()}window.onload=()=>{if(sessionStorage.getItem('ok')){loginPage.classList.add('hide');app.classList.remove('hide');boot()}};function currentYM(){let d=new Date();selectedYear=String(d.getFullYear());if(!years.includes(selectedYear))selectedYear='2026';selectedMonth=monthOnly[d.getMonth()]||'Jan'}function initRecords(){let d=[];years.forEach(y=>monthOnly.forEach(m=>defaults.forEach(x=>d.push({id:crypto.randomUUID(),type:x[0],name:x[1],icon:x[2],amount:x[3],year:y,month:m,group:x[4],status:x[5]}))));return d}async function boot(){currentYM();yearSelect.value=selectedYear;await loadDB()}async function loadDB(){syncStatus.textContent='ฐานข้อมูล: กำลังโหลด...';try{let r=await fetch('/api/state',{cache:'no-store'});if(!r.ok)throw new Error(await r.text());let s=await r.json();records=Array.isArray(s.records)?s.records:initRecords();syncStatus.textContent='ฐานข้อมูล: โหลดสำเร็จ / ไม่มีรีเฟรชอัตโนมัติ'}catch(e){records=initRecords();syncStatus.textContent='ฐานข้อมูล: ใช้ข้อมูลเริ่มต้น / ไม่มีรีเฟรชอัตโนมัติ'}render()}async function saveDB(){syncStatus.textContent='ฐานข้อมูล: กำลังบันทึก...';try{await fetch('/api/state',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({records})});syncStatus.textContent='ฐานข้อมูล: บันทึกแล้ว / ไม่มีรีเฟรชอัตโนมัติ'}catch(e){syncStatus.textContent='ฐานข้อมูล: บันทึกไม่สำเร็จ'}}const fmt=n=>Math.round(+n||0).toLocaleString('th-TH')+' บาท';function esc(s){return String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[m]))}function lbl(g){return `${th[g]||g} (${g})`}function visible(t){return records.filter(r=>r.type===t&&String(r.year)===selectedYear&&(selectedMonth==='All'||r.month===selectedMonth))}function aggregate(items,by){let map={};items.forEach(r=>{let k=by(r);map[k]=(map[k]||0)+(+r.amount||0)});return Object.entries(map).map(([name,amount])=>({name,amount}))}function renderMonths(){monthPanel.innerHTML=months.map(m=>`<button class="month ${m===selectedMonth?'active':''}" onclick="selectedMonth='${m}';render()">${m}</button>`).join('')}function renderTable(id,t,items){let total=items.reduce((s,x)=>s+(+x.amount||0),0),body='';if(t==='expense'){groups.forEach(g=>{let a=items.filter(x=>x.group===g);if(!a.length)return;body+=`<tr class="group-row"><td colspan="4">${lbl(g)} <span style="float:right">${fmt(a.reduce((s,x)=>s+(+x.amount||0),0))}</span></td></tr>`+a.map(x=>`<tr><td>${esc(x.name)} <span class="tag ${x.status}">${x.status}</span><div class="small">${x.month} ${x.year}</div></td><td>${fmt(x.amount)}</td><td>${x.month}</td><td><button onclick="openModal('${t}','${x.id}')">✏️</button><button onclick="del('${x.id}')">🗑️</button></td></tr>`).join('')})}else body=items.map(x=>`<tr><td>${esc(x.name)}<div class="small">${x.month} ${x.year}</div></td><td>${fmt(x.amount)}</td><td>${x.month}</td><td><button onclick="openModal('${t}','${x.id}')">✏️</button><button onclick="del('${x.id}')">🗑️</button></td></tr>`).join('');document.getElementById(id).innerHTML=`<thead><tr><th>รายการ</th><th>Amount</th><th>เดือน</th><th>จัดการ</th></tr></thead><tbody>${body}</tbody><tfoot><tr><td>Total</td><td>${fmt(total)}</td><td></td><td></td></tr></tfoot>`}function renderCards(id,items){document.getElementById(id).innerHTML=items.map(x=>`<div class="kpi"><div class="icon">${x.icon||'💠'}</div><div class="label">${esc(x.name)}</div><div class="amt">${fmt(x.amount)}</div><div class="small">${x.month} ${x.year}</div>${x.group?`<div class="small">${lbl(x.group)}</div><div class="small ${x.status==='Completed'?'completed':'pending'}">${x.status}</div>`:''}</div>`).join('')}function makePie(ctx,labels,vals,title){return new Chart(ctx,{type:'pie',data:{labels:labels.length?labels:['ไม่มีข้อมูล'],datasets:[{data:vals.length?vals:[1],backgroundColor:labels.length?undefined:['#ddd']}]},options:{responsive:true,maintainAspectRatio:false,plugins:{title:{display:true,text:title,font:{family:'Sarabun',size:16,weight:'800'}},legend:{position:'left',labels:{font:{family:'Sarabun',size:12},boxWidth:12}}}}})}function makeBar(ctx,labels,vals,title){return new Chart(ctx,{type:'bar',data:{labels,datasets:[{data:vals,backgroundColor:'#55d0b8'}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},title:{display:true,text:title,font:{family:'Sarabun',size:16,weight:'800'}}}}})}function drawCharts(incAgg,pending,completed){Object.values(charts).forEach(c=>c?.destroy?.());charts={};requestAnimationFrame(()=>{charts.a=makePie(incomePie,incAgg.map(x=>x.name),incAgg.map(x=>x.amount),'สัดส่วนรายรับ');charts.b=makeBar(incomeBar,incAgg.map(x=>x.name),incAgg.map(x=>x.amount),'ยอดรายรับ');charts.c=makePie(expensePie,pending.map(x=>x.name),pending.map(x=>x.amount),'รายจ่าย Pending');charts.d=makePie(expensePie2,completed.map(x=>x.name),completed.map(x=>x.amount),'รายจ่าย Completed');setTimeout(()=>Object.values(charts).forEach(c=>c?.resize?.()),80)})}function render(){yearSelect.value=selectedYear;let inc=visible('income'),ex=visible('expense'),incAgg=aggregate(inc,r=>r.name),pending=aggregate(ex.filter(x=>x.status==='Pending'),r=>lbl(r.group||'Other')),completed=aggregate(ex.filter(x=>x.status==='Completed'),r=>lbl(r.group||'Other'));renderTable('incomeTable','income',inc);renderTable('expenseTable','expense',ex);renderCards('incomeCards',inc);renderCards('expenseCards',ex);incomeTotal.textContent='รวมรายรับ: '+fmt(inc.reduce((s,x)=>s+(+x.amount||0),0));incomeTop.textContent='รายรับสูงสุด: '+(incAgg.sort((a,b)=>b.amount-a.amount)[0]?.name||'-');expenseTotal.textContent='กลุ่มรายจ่าย Pending : '+fmt(pending.reduce((s,x)=>s+x.amount,0));expenseTotal2.textContent='กลุ่มรายจ่าย Completed : '+fmt(completed.reduce((s,x)=>s+x.amount,0));renderMonths();drawCharts(incAgg,pending,completed)}function selectYear(y){selectedYear=y;render()}function fillMonth(){itemMonth.innerHTML=monthOnly.map(m=>`<option>${m}</option>`).join('')}function fillGroups(){itemGroup.innerHTML=groups.map(g=>`<option value="${g}">${lbl(g)}</option>`).join('')}function toggleExpenseRows(){let e=itemType.value==='expense';groupRow.style.display=e?'grid':'none';statusRow.style.display=e?'grid':'none'}function openModal(t,id=''){fillMonth();fillGroups();editId.value=id;itemType.value=t;toggleExpenseRows();let item=id?records.find(x=>x.id===id):null;modalTitle.textContent=(id?'แก้ไข ':'เพิ่ม ')+(t==='income'?'รายรับ':'รายจ่าย');itemMonth.value=item?.month||(selectedMonth==='All'?monthOnly[new Date().getMonth()]:selectedMonth);itemName.value=item?.name||'';itemIcon.value=item?.icon||(t==='income'?'💰':'🧾');itemAmount.value=item?.amount||0;itemGroup.value=item?.group||'Other';itemCompleted.checked=(item?.status||'Pending')==='Completed';modal.showModal()}async function saveItem(e){e.preventDefault();let id=editId.value,t=itemType.value;let item={id:id||crypto.randomUUID(),type:t,name:itemName.value.trim(),icon:itemIcon.value.trim()||'💠',amount:+itemAmount.value||0,year:selectedYear,month:itemMonth.value};if(t==='expense'){item.group=itemGroup.value;item.status=itemCompleted.checked?'Completed':'Pending'}records=records.filter(x=>x.id!==id);records.push(item);modal.close();render();await saveDB()}async function del(id){if(confirm('ต้องการลบรายการนี้ใช่หรือไม่?')){records=records.filter(x=>x.id!==id);render();await saveDB()}}async function pullPrev(){if(selectedMonth==='All')return alert('กรุณาเลือกเดือน');let i=monthOnly.indexOf(selectedMonth),p=i>0?{y:selectedYear,m:monthOnly[i-1]}:{y:String(+selectedYear-1),m:'Dec'};if(+p.y<2026)return alert('ไม่มีเดือนก่อนหน้า');let prev=records.filter(r=>String(r.year)===p.y&&r.month===p.m);records=records.filter(r=>!(String(r.year)===selectedYear&&r.month===selectedMonth));prev.forEach(r=>records.push({...r,id:crypto.randomUUID(),year:selectedYear,month:selectedMonth}));render();await saveDB()}function exportImage(){let c=document.createElement('canvas');c.width=1080;c.height=1200;let g=c.getContext('2d');g.fillStyle='#f7fafb';g.fillRect(0,0,c.width,c.height);g.fillStyle='#263238';g.textAlign='center';g.font='800 58px Sarabun,Tahoma';g.fillText('บัญชีรายรับ-รายจ่าย',540,90);g.font='700 34px Sarabun,Tahoma';g.fillText(`Export ${selectedMonth} ${selectedYear}`,540,145);let a=document.createElement('a');a.href=c.toDataURL('image/png');a.download=`dashboard_${selectedYear}_${selectedMonth}.png`;a.click()}</script></body></html>
