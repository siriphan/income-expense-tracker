<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>บัญชีรายรับ-รายจ่าย</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap');
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:"Sarabun",Tahoma,sans-serif;background:#eef3f5;color:#203238;font-size:18px}button,input,select{font-family:inherit;font-size:16px}.hide{display:none!important}.login{min-height:100dvh;display:grid;place-items:center;background:linear-gradient(135deg,#55d0b8,#ffaaa0);padding:16px}.login-card{background:#fff;border:3px solid #222;border-radius:18px;width:min(420px,94vw);padding:22px;box-shadow:0 16px 44px #0005}.login-card h1{text-align:center;margin:0 0 16px}.login-row{display:grid;gap:5px;margin:12px 0}.login-row label{font-weight:800}.login-row input{padding:10px;border:1px solid #b8c8c8;border-radius:10px}.err{color:#b00020;font-weight:800;text-align:center;min-height:24px}.app{height:100dvh;display:grid;grid-template-rows:auto auto 1fr;gap:6px;padding:6px}.top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:#fff;border:2px solid #222;border-radius:10px;padding:7px}.top h1{font-size:30px;margin:0 8px 0 0;line-height:1}.btn{border:1px solid #9aa;border-radius:8px;background:#fff;padding:6px 10px;font-weight:800;cursor:pointer;white-space:nowrap}.incomeBtn{background:#dff8f3;color:#087363}.expenseBtn{background:#ffe4e0;color:#9b3931}.warn{background:#fff6d7}.info{background:#e8f1ff;color:#134d91}.dark{background:#222;color:#fff}.sync{font-size:13px;color:#526}.months{display:flex;gap:6px;overflow-x:auto;background:#faffff;border:2px solid #222;border-radius:8px;padding:6px}.month{min-width:52px;border:1px solid #aaa;border-radius:7px;background:#fff;padding:6px 9px;font-weight:700}.month.active{background:#4ecbb2;color:#fff;border-color:#4ecbb2}.dash{min-height:0;display:grid;grid-template-rows:1fr 1fr;gap:6px}.section{min-height:0;background:#fff;border:2px solid #222;display:grid;grid-template-rows:auto 1fr}.section-title{text-align:center;font-weight:900;font-size:28px;padding:7px}.income .section-title{background:#55d0b8}.expense .section-title{background:#ffaaa0}.section-body{min-height:0;display:grid;grid-template-columns:minmax(330px,30%) minmax(260px,24%) 1fr;gap:8px;padding:8px;overflow:hidden}.panel{min-height:0;overflow:auto}.cards{display:grid;grid-template-columns:repeat(2,minmax(110px,1fr));gap:8px;align-content:start}.kpi{text-align:center;border:1px solid #d7caca;border-radius:10px;background:#f7ffff;padding:8px;min-width:0}.expense .kpi{background:#fff4f2}.icon{font-size:34px;line-height:1}.label{display:inline-block;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border:1px solid #d4bfc0;background:#fff;border-radius:6px;padding:2px 7px;font-weight:800}.amt{font-size:20px;font-weight:900;margin-top:5px}.small{font-size:12px;color:#765;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.pending{color:#b57600}.completed{color:#16823a}.chart-grid{height:100%;min-height:0;display:grid;grid-template-columns:1fr 1fr;gap:8px}.chart-card{min-height:0;border-left:1px solid #d5e0e0;padding:4px;display:grid;grid-template-rows:1fr auto}canvas{width:100%!important;height:100%!important}.pill{border:1px solid #ccd8d8;border-radius:999px;text-align:center;font-weight:800;padding:5px;margin-top:5px;background:#fff}table{width:100%;border-collapse:collapse;font-size:15px;table-layout:fixed}th,td{border:1px solid #d7e2e2;padding:6px}th{background:#d8f5ee;text-align:left}.expense th{background:#ffd8d2}td:nth-child(2),th:nth-child(2){width:115px;text-align:right;white-space:nowrap}td:nth-child(3),th:nth-child(3){width:88px;text-align:center}.group-row td{background:#fff1da!important;color:#795100;font-weight:900}.tag{font-size:12px;border-radius:999px;padding:1px 6px;margin-left:4px}.tag.Pending{background:#fff2ce;color:#9b6200}.tag.Completed{background:#dff8e9;color:#14733a}tfoot td{font-weight:900;background:#e5faf4}.expense tfoot td{background:#ffe8e4}dialog{border:0;border-radius:14px;box-shadow:0 18px 55px #0006;width:min(560px,94vw);padding:0}.modal-head{background:#222;color:#fff;font-weight:900;font-size:24px;padding:10px 14px}.modal-body{display:grid;gap:10px;padding:14px}.form-row{display:grid;grid-template-columns:150px 1fr;gap:8px;align-items:center}.form-row input,.form-row select{width:100%;padding:8px;border:1px solid #c7d2d2;border-radius:8px}.check{display:flex;gap:8px;align-items:center}.check input{width:22px;height:22px}.modal-actions{text-align:right;border-top:1px solid #eee;padding:10px}.force-mobile .app{height:auto}.force-mobile .dash{grid-template-rows:auto auto}.force-mobile .section-body{grid-template-columns:1fr;overflow:visible}.force-mobile .chart-grid{grid-template-columns:1fr;height:620px}.force-mobile .cards{grid-template-columns:1fr}.force-mobile .panel{min-height:180px}.force-mobile table{min-width:540px}@media(max-width:1100px){html,body{overflow:auto}.app{height:auto}.top{position:sticky;top:0;z-index:3}.dash{grid-template-rows:auto auto}.section-body{grid-template-columns:1fr;overflow:visible}.cards{grid-template-columns:repeat(2,minmax(130px,1fr))}.chart-grid{grid-template-columns:1fr;height:620px}.panel{min-height:180px}table{min-width:540px}.section-title{font-size:24px}}@media(max-width:640px){.top h1{width:100%;font-size:25px}.top .btn,.top select{font-size:14px;padding:5px 7px}.cards{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}.month{min-width:48px}.chart-grid{height:560px}.section-body{padding:5px}.app{padding:4px}.section-title{font-size:22px}}</style></head><body>
<section id="loginPage" class="login"><form class="login-card" onsubmit="login(event)"><h1>เข้าสู่ระบบ</h1><div class="login-row"><label>User</label><input id="loginUser" required></div><div class="login-row"><label>Password</label><input id="loginPass" type="password" required></div><button class="btn dark" style="width:100%;font-size:22px">Login</button><div id="loginError" class="err"></div></form></section>
<main id="app" class="app hide"><div class="top"><h1>บัญชีรายรับ-รายจ่าย</h1><label>ปี <select id="yearSelect" onchange="selectYear(this.value)"><option>2026</option><option>2027</option><option>2028</option><option>2029</option></select></label><button class="btn info" id="mobileBtn" onclick="toggleMobileView()">แสดงบนมือถือ</button><button class="btn incomeBtn" onclick="openModal('income')">+ รายรับ</button><button class="btn expenseBtn" onclick="openModal('expense')">+ รายจ่าย</button><button class="btn info" onclick="pullPrev()">ดึงเดือนก่อนหน้า</button><button class="btn warn" onclick="exportImage()">Export รูปภาพ</button><button class="btn" onclick="loadDB()">โหลดข้อมูลล่าสุด</button><span class="sync" id="syncStatus">ฐานข้อมูล: -</span><button class="btn" onclick="logout()">Logout</button></div><div id="monthPanel" class="months"></div><div class="dash"><section class="section income"><div class="section-title">รายรับ</div><div class="section-body"><div class="panel"><table id="incomeTable"></table></div><div class="panel cards" id="incomeCards"></div><div class="chart-grid"><div class="chart-card"><canvas id="incomePie"></canvas><div class="pill" id="incomeTotal"></div></div><div class="chart-card"><canvas id="incomeBar"></canvas><div class="pill" id="incomeTop"></div></div></div></div></section><section class="section expense"><div class="section-title">รายจ่าย</div><div class="section-body"><div class="panel"><table id="expenseTable"></table></div><div class="panel cards" id="expenseCards"></div><div class="chart-grid"><div class="chart-card"><canvas id="expensePie"></canvas><div class="pill" id="expenseTotal"></div></div><div class="chart-card"><canvas id="expensePie2"></canvas><div class="pill" id="expenseTotal2"></div></div></div></div></section></div></main>
<dialog id="modal"><form method="dialog" onsubmit="saveItem(event)"><div class="modal-head" id="modalTitle"></div><div class="modal-body"><input type="hidden" id="editId"><input type="hidden" id="editType"><div class="form-row"><label>ประเภท</label><select id="itemType" onchange="toggleExpenseRows()"><option value="income">รายรับ</option><option value="expense">รายจ่าย</option></select></div><div class="form-row" id="groupRow"><label>กลุ่มรายจ่าย</label><select id="itemGroup"></select></div><div class="form-row" id="statusRow"><label>Status</label><label class="check"><input id="itemCompleted" type="checkbox"> Completed <span style="font-size:13px;color:#777">ไม่ติ๊ก = Pending</span></label></div><div class="form-row"><label>ชื่อรายการ</label><input id="itemName" required></div><div class="form-row"><label>จำนวนเงิน</label><input id="itemAmount" type="number" min="0" step="1" required></div><div class="form-row"><label>ไอคอน</label><input id="itemIcon"></div><div style="font-size:13px;color:#667" id="modalHint"></div></div><div class="modal-actions"><button class="btn" type="button" onclick="modal.close()">ยกเลิก</button><button class="btn dark">บันทึก</button></div></form></dialog>
<script>
const AUTH_USER='admin',AUTH_PASS='siriphan';const years=['2026','2027','2028','2029'],months=['All','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],monthOnly=months.slice(1);const groups=['Essential Expenses','Financial Expenses','Self-Development','Personal Expenses','Health','Family','Variable / Emergency','Savings & Investment','Other'];const th={'Essential Expenses':'ค่าใช้จ่ายจำเป็น','Financial Expenses':'ภาระทางการเงิน','Self-Development':'พัฒนาตนเอง','Personal Expenses':'ค่าใช้จ่ายส่วนตัว','Health':'สุขภาพ','Family':'ครอบครัว','Variable / Emergency':'ผันแปร/ฉุกเฉิน','Savings & Investment':'ออมและลงทุน','Other':'อื่น ๆ'};const def={income:[['Salary','💰',614400],['Freelance','👨‍💻',635552],['Interest','📈',46041],['Bonus','💵',92260],['Investment','📊',36291],['Overtime','⏱️',44960],['Profit','💲',50301],['Dividend','🧾',28021]],expense:[['Rent','🏠',348000,'Essential Expenses','Pending'],['Shopping','🛒',243722,'Personal Expenses','Pending'],['Transport','🚗',105643,'Essential Expenses','Pending'],['ค่าไฟ','🧾',2500,'Essential Expenses','Completed']]};let selectedYear,selectedMonth,data,monthly,charts={};
function login(e){e.preventDefault();if(loginUser.value===AUTH_USER&&loginPass.value===AUTH_PASS){sessionStorage.setItem('ok','1');loginPage.classList.add('hide');app.classList.remove('hide');boot()}else loginError.textContent='User หรือ Password ไม่ถูกต้อง'}function logout(){sessionStorage.removeItem('ok');location.reload()}window.onload=()=>{if(sessionStorage.getItem('ok')){loginPage.classList.add('hide');app.classList.remove('hide');boot()}};function toggleMobileView(){document.body.classList.toggle('force-mobile');mobileBtn.textContent=document.body.classList.contains('force-mobile')?'ปิดโหมดมือถือ':'แสดงบนมือถือ';setTimeout(()=>Object.values(charts).forEach(c=>c.resize()),80)}function setCurrentMonth(){let d=new Date();selectedYear=String(d.getFullYear());if(!years.includes(selectedYear))selectedYear='2026';selectedMonth=monthOnly[d.getMonth()]}
function norm(s){s=s?.data?s.data:s;return{income:(s?.income||[]).map(x=>({id:x.id||crypto.randomUUID(),name:x.name||x[0],icon:x.icon||x[1]||'💠'})),expense:(s?.expense||[]).map(x=>({id:x.id||crypto.randomUUID(),name:x.name||x[0],icon:x.icon||x[1]||'💠',group:x.group||x[3]||'Other',status:x.status||x[4]||'Pending'}))}}function key(y,m){return y+'-'+m}function initMonthly(d){let m={};years.forEach(y=>monthOnly.forEach(mm=>{m[key(y,mm)]={income:{},expense:{}};['income','expense'].forEach(t=>d[t].forEach(x=>{let old=(def[t].find(a=>a[0]===x.name)||[])[2]||0;m[key(y,mm)][t][x.id]=Math.round(old/12)}))}));return m}async function boot(){setCurrentMonth();yearSelect.value=selectedYear;await loadDB()}async function loadDB(){syncStatus.textContent='ฐานข้อมูล: กำลังโหลด...';try{let r=await fetch('/api/state',{cache:'no-store'});if(!r.ok)throw new Error(await r.text());let s=await r.json();data=norm(s.data||def);monthly=s.monthly||initMonthly(data);syncStatus.textContent='ฐานข้อมูล: โหลดสำเร็จ'}catch(e){data=norm(def);monthly=initMonthly(data);syncStatus.textContent='ฐานข้อมูล: ใช้ข้อมูลเริ่มต้น'}render()}async function saveDB(){syncStatus.textContent='ฐานข้อมูล: กำลังบันทึก...';try{await fetch('/api/state',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({data,monthly})});syncStatus.textContent='ฐานข้อมูล: บันทึกแล้ว'}catch(e){syncStatus.textContent='ฐานข้อมูล: บันทึกไม่สำเร็จ'}}const fmt=n=>Math.round(+n||0).toLocaleString('th-TH')+' บาท';function mv(t,id,y=selectedYear,m=selectedMonth){return +(monthly?.[key(y,m)]?.[t]?.[id]||0)}function smv(t,id,v,y=selectedYear,m=selectedMonth){monthly[key(y,m)] ||= {income:{},expense:{}};monthly[key(y,m)][t] ||= {};monthly[key(y,m)][t][id]=+v||0}function av(t,id,y=selectedYear){return monthOnly.reduce((s,m)=>s+mv(t,id,y,m),0)}function rows(t){return data[t].map(x=>({...x,amount:selectedMonth==='All'?av(t,x.id):mv(t,x.id)}))}function esc(s){return String(s).replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[m]))}function lbl(g){return `${th[g]||g} (${g})`}function renderMonths(){monthPanel.innerHTML=months.map(m=>`<button class="month ${m===selectedMonth?'active':''}" onclick="selectedMonth='${m}';render()">${m}</button>`).join('')}function renderTable(id,t,items){let total=items.reduce((s,x)=>s+x.amount,0),body='';if(t==='expense'){groups.forEach(g=>{let a=items.filter(x=>x.group===g);if(!a.length)return;body+=`<tr class="group-row"><td colspan="3">${lbl(g)} <span style="float:right">${fmt(a.reduce((s,x)=>s+x.amount,0))}</span></td></tr>`+a.map(x=>`<tr><td>${esc(x.name)} <span class="tag ${x.status}">${x.status}</span></td><td>${fmt(x.amount)}</td><td><button onclick="openModal('${t}','${x.id}')">✏️</button><button onclick="del('${t}','${x.id}')">🗑️</button></td></tr>`).join('')})}else body=items.map(x=>`<tr><td>${esc(x.name)}</td><td>${fmt(x.amount)}</td><td><button onclick="openModal('${t}','${x.id}')">✏️</button><button onclick="del('${t}','${x.id}')">🗑️</button></td></tr>`).join('');document.getElementById(id).innerHTML=`<thead><tr><th>รายการ</th><th>Amount</th><th>จัดการ</th></tr></thead><tbody>${body}</tbody><tfoot><tr><td>Total</td><td>${fmt(total)}</td><td></td></tr></tfoot>`}function renderCards(id,items){document.getElementById(id).innerHTML=items.map(x=>`<div class="kpi"><div class="icon">${x.icon}</div><div class="label">${esc(x.name)}</div><div class="amt">${fmt(x.amount)}</div>${x.group?`<div class="small">${lbl(x.group)}</div><div class="small ${x.status==='Completed'?'completed':'pending'}">${x.status}</div>`:''}</div>`).join('')}function pie(ctx,labels,vals,title){return new Chart(ctx,{type:'pie',data:{labels:labels.length?labels:['ไม่มีข้อมูล'],datasets:[{data:vals.length?vals:[1]}]},options:{responsive:true,maintainAspectRatio:false,plugins:{title:{display:true,text:title,font:{family:'Sarabun',size:16,weight:'800'}},legend:{position:'left',labels:{font:{family:'Sarabun',size:12},boxWidth:12}}}}})}function bar(ctx,labels,vals,title){return new Chart(ctx,{type:'bar',data:{labels,datasets:[{data:vals,backgroundColor:'#55d0b8'}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},title:{display:true,text:title,font:{family:'Sarabun',size:16,weight:'800'}}}}})}function render(){yearSelect.value=selectedYear;let inc=rows('income'),ex=rows('expense'),pending=groups.map(g=>({label:lbl(g),v:ex.filter(x=>x.group===g&&x.status==='Pending').reduce((s,x)=>s+x.amount,0)})).filter(x=>x.v),completed=groups.map(g=>({label:lbl(g),v:ex.filter(x=>x.group===g&&x.status==='Completed').reduce((s,x)=>s+x.amount,0)})).filter(x=>x.v);renderTable('incomeTable','income',inc);renderTable('expenseTable','expense',ex);renderCards('incomeCards',inc);renderCards('expenseCards',ex);Object.values(charts).forEach(c=>c.destroy());charts.a=pie(incomePie,inc.map(x=>x.name),inc.map(x=>x.amount),'สัดส่วนรายรับ');charts.b=bar(incomeBar,inc.map(x=>x.name),inc.map(x=>x.amount),'ยอดรายรับ');charts.c=pie(expensePie,pending.map(x=>x.label),pending.map(x=>x.v),'รายจ่าย Pending');charts.d=pie(expensePie2,completed.map(x=>x.label),completed.map(x=>x.v),'รายจ่าย Completed');incomeTotal.textContent='รวมรายรับ: '+fmt(inc.reduce((s,x)=>s+x.amount,0));incomeTop.textContent='รายรับสูงสุด: '+(inc.sort((a,b)=>b.amount-a.amount)[0]?.name||'-');expenseTotal.textContent='กลุ่มรายจ่าย Pending : '+fmt(pending.reduce((s,x)=>s+x.v,0));expenseTotal2.textContent='กลุ่มรายจ่าย Completed : '+fmt(completed.reduce((s,x)=>s+x.v,0));renderMonths()}function selectYear(y){selectedYear=y;render()}function fillGroups(){itemGroup.innerHTML=groups.map(g=>`<option value="${g}">${lbl(g)}</option>`).join('')}function toggleExpenseRows(){let e=itemType.value==='expense';groupRow.style.display=e?'grid':'none';statusRow.style.display=e?'grid':'none'}function openModal(t,id=''){fillGroups();editType.value=t;editId.value=id;itemType.value=t;toggleExpenseRows();let item=id?data[t].find(x=>x.id===id):null;modalTitle.textContent=(id?'แก้ไข ':'เพิ่ม ')+(t==='income'?'รายรับ':'รายจ่าย');itemName.value=item?.name||'';itemIcon.value=item?.icon||(t==='income'?'💰':'🧾');itemAmount.value=item?(selectedMonth==='All'?av(t,item.id):mv(t,item.id)):0;itemGroup.value=item?.group||'Other';itemCompleted.checked=(item?.status||'Pending')==='Completed';modalHint.textContent=selectedMonth==='All'?'โหมด All: บันทึกหารเฉลี่ย 12 เดือน':'กำลังแก้ไขข้อมูลเฉพาะเดือน '+selectedMonth+' '+selectedYear;modal.showModal()}async function saveItem(e){e.preventDefault();let t=itemType.value,id=editId.value,old=editType.value,item={id:id||crypto.randomUUID(),name:itemName.value.trim(),icon:itemIcon.value.trim()||'💠'};if(t==='expense'){item.group=itemGroup.value;item.status=itemCompleted.checked?'Completed':'Pending'}if(id){data[old]=data[old].filter(x=>x.id!==id);data[t].push(item)}else data[t].push(item);let amount=+itemAmount.value||0;if(selectedMonth==='All')monthOnly.forEach(m=>smv(t,item.id,Math.round(amount/12),selectedYear,m));else smv(t,item.id,amount);modal.close();render();await saveDB()}async function del(t,id){if(confirm('ต้องการลบรายการนี้ใช่หรือไม่?')){data[t]=data[t].filter(x=>x.id!==id);Object.values(monthly).forEach(v=>{delete v[t]?.[id]});render();await saveDB()}}async function pullPrev(){if(selectedMonth==='All')return alert('กรุณาเลือกเดือน');let i=monthOnly.indexOf(selectedMonth),p=i>0?{y:selectedYear,m:monthOnly[i-1]}:{y:String(+selectedYear-1),m:'Dec'};if(+p.y<2026)return alert('ไม่มีเดือนก่อนหน้า');['income','expense'].forEach(t=>data[t].forEach(x=>smv(t,x.id,mv(t,x.id,p.y,p.m))));render();await saveDB()}function exportImage(){let c=document.createElement('canvas');c.width=1080;c.height=1200;let g=c.getContext('2d');g.fillStyle='#f7fafb';g.fillRect(0,0,c.width,c.height);g.fillStyle='#263238';g.textAlign='center';g.font='800 58px Sarabun,Tahoma';g.fillText('บัญชีรายรับ-รายจ่าย',540,90);g.font='700 34px Sarabun,Tahoma';g.fillText('Export จาก Dashboard',540,145);let a=document.createElement('a');a.href=c.toDataURL('image/png');a.download=`dashboard_${selectedYear}_${selectedMonth}.png`;a.click()}</script></body></html>
